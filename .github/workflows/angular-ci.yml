name: Angular CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: helm-gh-runner

    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v2

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install Chromium via Puppeteer
      run: npx puppeteer browsers install chrome

    - name : Install Dependencies
      run: npm ci

    - name: Install Browser Dependencies
      run: |
        sudo apt-get update || true
        sudo apt-get install -y libnspr4 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2

    - name: Install Chrome via Puppeteer
      run: |
        export PUPPETEER_CACHE_DIR=$HOME/.cache/puppeteer
        npx puppeteer browsers install chrome

    - name: Build
      run: npm run build --if-present -- --configuration production

    - name: Lint
      run: npm run lint

    - name: Test
      run: |
        export CHROME_BIN=$(find $HOME/.cache/puppeteer -name chrome -type f | head -n 1)
        npm run test-headless