name: Angular CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: helm-gh-runner

    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v2

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install Chromium via Puppeteer
      run: npx puppeteer browsers install chrome

    - name : Install Dependencies
      run: npm ci

    - name: Build
      run: npm run build --if-present -- --configuration production

    - name: Lint
      run: npm run lint

    - name: Test
      run: |
        export PUPPETEER_CACHE_DIR=$HOME/.cache/puppeteer
        npx puppeteer browsers install chrome
        
        export CHROME_BIN=$(find $HOME/.cache/puppeteer -name chrome -type f | head -n 1)
        
        echo "Usando Chrome en: $CHROME_BIN"
        
        npm run test-headless