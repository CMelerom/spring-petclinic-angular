name: Angular CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: helm-gh-runner

    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v2

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install Chromium via Puppeteer
      run: npx puppeteer browsers install chrome

    - name : Install Dependencies
      run: npm ci

    - name: Build
      run: npm run build --if-present -- --configuration production

    - name: Lint
      run: npm run lint

    - name: Test
      run: |
        export CHROME_BIN=$(node -e "console.log(require('puppeteer').executablePath())" 2>/dev/null || which google-chrome || which chromium-browser)
        npm run test-headless